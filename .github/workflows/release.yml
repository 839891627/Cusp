name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example: v0.1.0)"
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.value }}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "invalid tag: $tag (expected v<major>.<minor>.<patch>)" >&2
            exit 1
          fi

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build unsigned release artifacts
        shell: bash
        run: |
          set -euo pipefail
          ./Scripts/release_unsigned_local.sh "${{ steps.tag.outputs.value }}"

      - name: Prepare release output
        id: package
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="$GITHUB_WORKSPACE/build/dist"
          test -d "$OUT_DIR"
          echo "out_dir=$OUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cusp-release-assets
          path: ${{ steps.package.outputs.out_dir }}

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.out_dir }}/*.zip
            ${{ steps.package.outputs.out_dir }}/*.dmg
            ${{ steps.package.outputs.out_dir }}/SHA256SUMS.txt
            ${{ steps.package.outputs.out_dir }}/UNSIGNED-NOTES.txt
