name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run open-source preflight
        run: ./Scripts/open_source_preflight.sh

      - name: Run unit tests
        run: swift test
